<header>
    <nav>
        <div class="menu1">
            <button
                [matMenuTriggerFor]="menus"
                class="main-menu-button"
                matButton
            ><mat-icon>arrow_drop_down</mat-icon> Menus</button>
            <mat-menu #menus="matMenu">
                @for(menu of mainMenus(); track $index){
                    <button mat-menu-item [routerLink]="'menus/' + menu.route">{{menu.label}}</button>
                }
            </mat-menu>
        </div>
        <div class="logo">
            <a routerLink=""><img src="/images/brionis_full_logo.png"></a>
        </div>
        <div class="menu2">
            <button
                class="main-menu-button"
                routerLink="info" 
                matButton 
            >Info</button>
        </div>
    </nav>
</header>
