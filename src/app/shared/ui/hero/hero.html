<div class="hero-image-container">
    <div class="hero-inner-wrapper">
        <mat-card
            class="mat-card-hero-child"
            appearance="filled"
        >
            <mat-card-header class="card-header">
                <mat-card-title>Order Now!</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                <div class="contact-grid">
                    <div class="contact-grid-row">
                        <div class="contact-item contact-grid-icon">
                            <mat-icon>phone</mat-icon>
                        </div>
                        <div class="contact-item contact-grid-info">
                            <div class="mobile-phone"><a href="tel:+15864680700">{{ metaStore.state().phone }}</a></div>
                            <div class="landline-phone">{{ metaStore.state()?.phone }}</div>
                        </div>
                    </div>
                </div>

                <div class="contact-grid">
                    <div class="contact-grid-row">
                        <div class="contact-item contact-grid-icon">
                            <mat-icon>location_on</mat-icon>
                        </div>
                        <div class="contact-item contact-grid-info">
                            <a 
                                [href]="metaStore.state()?.address?.map"
                                target="_blank"
                            >
                                {{ metaStore.state()?.address?.street }}<br>
                                {{ metaStore.state()?.address?.city }}, {{ metaStore.state()?.address?.state }} {{ metaStore.state()?.address?.zip }}
                            </a>
                        </div>
                    </div>
                </div>
            </mat-card-content>
        </mat-card>

        <mat-card
            class="mat-card-hero-child"
            appearance="filled"
        >
            <mat-card-content>
                <div class="about-content">
                    {{ metaStore.state()?.description?.home }}
                </div>
            </mat-card-content>
        </mat-card>
    </div>
</div>
