<div class="login-container">
    <div class="login-back-to-site">
        <button routerLink="" mat-button><mat-icon>arrow_back</mat-icon>Back to Site</button>
    </div>

    <mat-card class="login-card">
        <div class="card-sub-title">Administrator Login</div>
        <h2>Brioni's Pizza</h2>
        <form>
            <div class="form-inputs">
                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" required>
                </mat-form-field>
                <mat-form-field appearance="fill" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" required>
                </mat-form-field>
            </div>
            <div class="form-buttons">
                <button mat-flat-button color="primary" class="full-width">Login</button>
            </div>
        </form>
    </mat-card>
</div>
